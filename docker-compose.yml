services:
  mongo:
    image: mongo:7
    container_name: local-assistant-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
    container_name: local-assistant-backend
    env_file:
      - .env
    environment:
      MONGO_URL: mongodb://mongo:27017/local_assistant
      MONGO_DB_NAME: local_assistant
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  frontend:
    build:
      context: ./frontend
    container_name: local-assistant-frontend
    environment:
      VITE_API_BASE_URL: /api
      VITE_BACKEND_URL: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  mongo_data:
